version: '3.8'

services:
  backend:
    image: satriaadi9/leaderboard-app-backend:latest
    container_name: leaderboard_backend
    restart: always
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-leaderboard}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-supersecretprodkey_change_me_in_prod}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL:-isb@ciputra.ac.id}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD:-admin123}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
    depends_on:
      - postgres
      - redis
    networks:
      - app_network
      - proxy-network

  frontend:
    image: satriaadi9/leaderboard-app-frontend:latest
    container_name: leaderboard_frontend
    restart: always
    expose:
      - "80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - app_network
      - proxy-network

  postgres:
    image: postgres:15-alpine
    container_name: leaderboard_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-leaderboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: leaderboard_redis
    restart: always
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
  proxy-network:
    external: true

volumes:
  postgres_data:

